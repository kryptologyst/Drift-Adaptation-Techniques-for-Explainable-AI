# Default configuration for drift detection and adaptation experiments

# Dataset configuration
dataset:
  name: "synthetic"
  n_samples: 1000
  n_features: 10
  n_classes: 2
  test_size: 0.3
  random_state: 42

# Drift simulation configuration
drift:
  type: "concept"  # concept, covariate, label
  strength: 0.3
  drift_point: null  # null for gradual drift
  noise_level: 0.1

# Drift detection configuration
detection:
  methods: ["psi", "ks", "mmd"]
  psi:
    threshold: 0.1
    n_bins: 10
  ks:
    threshold: 0.05
  mmd:
    threshold: 0.05
    kernel: "rbf"
    gamma: null

# Model adaptation configuration
adaptation:
  methods: ["online", "ensemble", "uncertainty", "retraining"]
  online:
    learning_rate: 0.01
  ensemble:
    n_estimators: 5
    adaptation_weight: 0.3
  uncertainty:
    uncertainty_threshold: 0.5
    adaptation_rate: 0.1
  retraining:
    retraining_frequency: 100

# Model configuration
model:
  type: "random_forest"
  random_forest:
    n_estimators: 100
    max_depth: null
    min_samples_split: 2
    min_samples_leaf: 1
  logistic_regression:
    C: 1.0
    max_iter: 1000

# Evaluation configuration
evaluation:
  metrics: ["accuracy", "precision", "recall", "f1", "auc"]
  cross_validation:
    cv_folds: 5
    shuffle: true

# Visualization configuration
visualization:
  style: "seaborn-v0_8"
  figsize: [12, 8]
  dpi: 300
  save_plots: true
  output_dir: "assets"

# Logging configuration
logging:
  level: "INFO"
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
  file: "logs/experiment.log"

# Computational configuration
computational:
  n_jobs: -1
  memory_limit: "4GB"
  timeout: 3600  # seconds
